<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu Display App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: Inter, system-ui, sans-serif; }
    .glass { backdrop-filter: blur(10px); background: rgba(255,255,255,0.7); }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-slate-100 text-slate-900">
  <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/80 backdrop-blur">
    <div class="mx-auto max-w-7xl px-4 py-4 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
      <div>
        <h1 class="text-2xl font-bold tracking-tight">Restaurant Menu</h1>
        <p class="text-sm text-slate-500">Modern menu display app hosted free on GitHub Pages</p>
      </div>
      <div class="flex flex-col sm:flex-row gap-2">
        <input id="searchInput" type="text" placeholder="Search menu item..." class="w-full sm:w-72 rounded-xl border border-slate-300 px-4 py-2 outline-none focus:ring-2 focus:ring-slate-400" />
        <select id="categorySelect" class="rounded-xl border border-slate-300 px-4 py-2 outline-none focus:ring-2 focus:ring-slate-400">
          <option value="all">All Categories</option>
        </select>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-8">
    <section class="mb-8 overflow-hidden rounded-3xl bg-slate-900 text-white shadow-xl">
      <div class="grid md:grid-cols-2">
        <div class="p-8 md:p-12">
          <span class="inline-flex rounded-full bg-white/10 px-3 py-1 text-xs font-medium uppercase tracking-wide">Latest Design</span>
          <h2 class="mt-4 text-4xl font-bold leading-tight">Fresh Menu, Beautiful Display</h2>
          <p class="mt-4 text-slate-300">Upload or edit your menu data in one JSON file and the website updates instantly after you commit changes in GitHub.</p>
        </div>
        <div class="bg-gradient-to-br from-amber-400 via-orange-400 to-rose-500 min-h-[220px]"></div>
      </div>
    </section>

    <section id="menuGrid" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3"></section>
    <p id="emptyState" class="hidden py-12 text-center text-slate-500">No menu items found.</p>
  </main>

  <script>
    const menuData = [
      { name: 'Chicken Fried Rice', category: 'Rice', price: '20', description: 'Wok-tossed rice with chicken and vegetables', badge: 'Best Seller', image: 'https://images.unsplash.com/photo-1512058564366-18510be2db19?auto=format&fit=crop&w=900&q=80' },
      { name: 'Veg Noodles', category: 'Noodles', price: '16', description: 'Soft noodles with fresh vegetables and sauce', badge: 'Veg', image: 'https://images.unsplash.com/photo-1617622141573-1f8b6ff3f8b9?auto=format&fit=crop&w=900&q=80' },
      { name: 'Dynamite Shrimp', category: 'Starters', price: '24', description: 'Crispy shrimp with spicy creamy sauce', badge: 'New', image: 'https://images.unsplash.com/photo-1562967914-608f82629710?auto=format&fit=crop&w=900&q=80' },
      { name: 'Kung Pao Chicken', category: 'Main Course', price: '28', description: 'Spicy chicken with peanuts and peppers', badge: 'Spicy', image: 'https://images.unsplash.com/photo-1604908177522-429c475d8f39?auto=format&fit=crop&w=900&q=80' },
      { name: 'Mango Mojito', category: 'Beverages', price: '12', description: 'Refreshing mango mint cooler', badge: 'Cold', image: 'https://images.unsplash.com/photo-1556679343-c7306c1976bc?auto=format&fit=crop&w=900&q=80' },
      { name: 'Chocolate Brownie', category: 'Desserts', price: '14', description: 'Warm brownie with rich chocolate flavor', badge: 'Sweet', image: 'https://images.unsplash.com/photo-1606313564200-e75d5e30476c?auto=format&fit=crop&w=900&q=80' }
    ];

    const searchInput = document.getElementById('searchInput');
    const categorySelect = document.getElementById('categorySelect');
    const menuGrid = document.getElementById('menuGrid');
    const emptyState = document.getElementById('emptyState');

    const categories = [...new Set(menuData.map(item => item.category))];
    categories.forEach(category => {
      const option = document.createElement('option');
      option.value = category;
      option.textContent = category;
      categorySelect.appendChild(option);
    });

    function renderMenu() {
      const search = searchInput.value.toLowerCase();
      const category = categorySelect.value;

      const filtered = menuData.filter(item => {
        const matchesSearch = item.name.toLowerCase().includes(search) || item.description.toLowerCase().includes(search);
        const matchesCategory = category === 'all' || item.category === category;
        return matchesSearch && matchesCategory;
      });

      menuGrid.innerHTML = '';
      emptyState.classList.toggle('hidden', filtered.length !== 0);

      filtered.forEach(item => {
        const card = document.createElement('article');
        card.className = 'overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-sm transition hover:-translate-y-1 hover:shadow-xl';
        card.innerHTML = `
          <img src="${item.image}" alt="${item.name}" class="h-52 w-full object-cover" />
          <div class="p-5">
            <div class="mb-3 flex items-start justify-between gap-3">
              <div>
                <p class="text-xs font-medium uppercase tracking-wide text-slate-500">${item.category}</p>
                <h3 class="text-xl font-semibold">${item.name}</h3>
              </div>
              <span class="rounded-full bg-slate-900 px-3 py-1 text-sm font-semibold text-white">AED ${item.price}</span>
            </div>
            <p class="text-sm leading-6 text-slate-600">${item.description}</p>
            <div class="mt-4">
              <span class="inline-flex rounded-full bg-amber-100 px-3 py-1 text-xs font-medium text-amber-800">${item.badge}</span>
            </div>
          </div>`;
        menuGrid.appendChild(card);
      });
    }

    searchInput.addEventListener('input', renderMenu);
    categorySelect.addEventListener('change', renderMenu);
    renderMenu();
  </script>
</body>
</html>
